name: Daily Oil Market Report

on:
  schedule:
    # Runs every day at 8:00 AM Philippine Time (UTC+8) = 00:00 UTC
    - cron: '0 0 * * *'

  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  generate-report:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    permissions:
      contents: write  # Needed to commit the report back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Generate oil report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python oil_report.py

      - name: Commit and push report
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/
          git diff --cached --quiet || git commit -m "📊 Oil report - $(date +'%Y-%m-%d')"
          git push
